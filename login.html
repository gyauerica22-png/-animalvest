<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AnimalVest Ghana</title>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #151515;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: white;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ccc;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const supabaseUrl = "https://zjtspzuzbfetcvaqnbsy.supabase.co";

    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqdHNwenV6YmZldGN2YXFuYnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzQ2MTUsImV4cCI6MjA5ODE1MDYxNX0.ywaoFvFug4c3W6U1nJ07lWCBRmXsmbj_2KU5fhpKaV8";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      msg.textContent = "Logging in...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.textContent = "❌ " + error.message;
      } else {
        msg.textContent = "✅ Login successful!";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      }
    }
  </script>

</body>
</html>
