<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimalVest Ghana</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f7f6;
      color:#222;
    }

    /* NAV */
    .nav{
      background:#1b5e20;
      color:white;
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      align-items:center;
    }

    .nav a{
      color:white;
      margin-left:15px;
      text-decoration:none;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:60px 20px;
      background:linear-gradient(135deg,#2e7d32,#43a047);
      color:white;
    }

    .hero button{
      margin-top:15px;
      padding:12px 20px;
      border:none;
      border-radius:5px;
      background:white;
      color:#2e7d32;
      font-weight:bold;
      cursor:pointer;
    }

    /* SECTION TITLE */
    .title{
      text-align:center;
      margin:30px 0 10px;
      font-size:22px;
      font-weight:bold;
    }

    /* CARDS */
    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .price{
      color:#2e7d32;
      font-weight:bold;
    }

    /* FOOTER */
    .footer{
      background:#1b5e20;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div><b>AnimalVest</b></div>
    <div>
      <a href="#">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Invest in Livestock. Grow Your Wealth.</h1>
    <p>Start building income with animal investments in Ghana</p>
    <button>Start Investing</button>
  </div>

  <!-- INVESTMENTS -->
  <div class="title">Investment Plans</div>

  <div class="container">

    <div class="card">
      <h3>🐄 Cattle</h3>
      <p class="price">GHC 1,000+</p>
    </div>

    <div class="card">
      <h3>🐐 Goats</h3>
      <p class="price">GHC 500+</p>
    </div>

    <div class="card">
      <h3>🐓 Poultry</h3>
      <p class="price">GHC 200+</p>
    </div>

    <div class="card">
      <h3>🐖 Pigs</h3>
      <p class="price">GHC 800+</p>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 AnimalVest Ghana. All rights reserved.
  </div>

</body>
</html>
