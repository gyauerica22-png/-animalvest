<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimalVest Ghana</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
      background: white;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* FORM POPUP */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<header>
  <h1>AnimalVest Ghana</h1>
  <p>Invest in Livestock. Grow Your Future.</p>
</header>

<div class="hero">
  <h1>Start Investing in Animals Today</h1>
  <p>Simple and profitable livestock investment platform.</p>
  <a class="btn" href="#animals">Get Started</a>
</div>

<div class="section" id="animals">
  <h2>Investment Packages</h2>

  <div class="grid">

    <div class="card">
      <h3>🐄 Cow</h3>
      <p>GH₵ 2,000</p>
      <button onclick="openForm('Cow')">Invest Now</button>
    </div>

    <div class="card">
      <h3>🐐 Goat</h3>
      <p>GH₵ 800</p>
      <button onclick="openForm('Goat')">Invest Now</button>
    </div>

    <div class="card">
      <h3>🐓 Chicken</h3>
      <p>GH₵ 200</p>
      <button onclick="openForm('Chicken')">Invest Now</button>
    </div>

  </div>
</div>

<!-- FORM POPUP -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="animalTitle">Invest</h3>

    <input type="text" placeholder="Your Name" />
    <input type="text" placeholder="Phone Number" />
    <input type="number" placeholder="Amount" />

    <button onclick="submitForm()">Submit</button>
    <button onclick="closeForm()">Close</button>
  </div>
</div>

<script>
  let selectedAnimal = "";

  function openForm(animal) {
    selectedAnimal = animal;
    document.getElementById("animalTitle").innerText = "Invest in " + animal;
    document.getElementById("modal").style.display = "flex";
  }

  function closeForm() {
    document.getElementById("modal").style.display = "none";
  }

  function submitForm() {
    alert("Investment submitted for " + selectedAnimal + " (demo only)");
    closeForm();
  }
</script>

</body>
</html>
